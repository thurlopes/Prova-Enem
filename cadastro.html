<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de Inscrição</title>
    <h1>Tela de Inscrição</h1>

    <link rel="stylesheet" href="cadastro.css">

</head>

    <hr>

<body>
    <div>
<h2>Registre abaixo suas Informações</h2>

<p>
    <label for="nome">Nome Completo:</label><br>
   <input type="text" id="nome" name="nome" required>
</p>

<p>
    <label for="email">Email:</label><br>
    <input type="text" id="email" name="nome" required>
 </p>

<p>
   <label for="telefone">Telefone:</label><br>
   <input type="text" id="telefone" name="nome" required>
</p>

<p>
    <label for="nome">Nome do Pai:</label><br>
   <input type="text" id="nome" name="nome" required>
</p>

<p>
    <label for="nome">Nome da Mãe:</label><br>
   <input type="text" id="nome" name="nome" required>
</p>

<p>
    <label for="endereço">Endereço (Rua/Avenida):</label><br>
   <input type="text" id="endereço" name="nome" required>
</p>

<p>
   <label for="numero">Número:</label><br>
   <input type="number" id="numero" name="nome" required>
</p>

<p>
    <label for="cidade">Cidade em que mora:</label><br>
    <input type="text" id="cidade" name="nome" required>
 </p>

 <p>
    <label for="estado">Estado:</label><br>
    <input type="text" id="estado" name="nome" required>
 </p>

 <p>
    <label for="pais">País:</label><br>
    <input type="text" id="pais" name="nome" required>
 </p>

 <p>Está cursando Ensino Médio?</p>

 <input type="radio" id="Resposta" name="Resposta" required>
 <label for="Resposta">Já concluí</label>
 <input type="radio" id="Resposta" name="Resposta" required>
 <label for="Resposta">Estou cursando</label>

 <p>
    <label for="ensinom">Se está cursando, em que parte está?</label><br>
    <input type="text" id="ensionom" name="nome" required>
 </p>

 <p>Tipo de Escola:</p>

 <input type="radio" id="Resposta" name="Resposta" required>
 <label for="Resposta">Pública</label>
 <input type="radio" id="Resposta" name="Resposta" required>
 <label for="Resposta">Particular</label>

 <p>
   <label for="senha">Senha:</label><br>
  <input type="text" id="senha" name="nome" required>
</p>

<p>
   <label for="senha">Confirmar Senha:</label><br>
  <input type="text" id="senha" name="nome" required>
</p>

<button type="button" onclick="salvarInscricao()">Salvar Inscrição</button>

<button type="button" onclick="voltarParaInicial()">Voltar</button>

</div>

</body>
</html>
